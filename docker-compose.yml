services:
  symbol-manager:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SYMBOL_BOOTSTRAP_REPO: ${SYMBOL_BOOTSTRAP_REPO:-https://github.com/bootarou/symbol-bootstrap.git}
    container_name: symbol-manager
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:4000:4000"   # Backend API & WebSocket
      - "${BIND_ADDRESS:-127.0.0.1}:5173:5173"   # Frontend Vite dev server
      # NOTE: 3000 and 7900 are NOT mapped here.
      # symbol-bootstrap creates sibling containers (rest-gateway, api-node)
      # via the shared docker.sock, and those containers bind directly to
      # host ports 3000 / 7900 themselves.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock   # Docker-in-Docker
      - ./shared:/app/shared                         # Preset & config persistence
      - ${SYMBOL_TARGET_DIR:-/var/lib/symbol-target}:${SYMBOL_TARGET_DIR:-/var/lib/symbol-target}  # DinD: same path on host VM & container
      - ./.env:/app/host-env                          # Let backend update SYMBOL_TARGET_DIR
      - ./backend:/app/backend                       # Live reload (dev)
      - ./frontend:/app/frontend                     # Live reload (dev)
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - PORT=4000
      - TARGET_DIR=${SYMBOL_TARGET_DIR:-/var/lib/symbol-target}
      # ── Admin authentication ──
      # Set ADMIN_PASSWORD to enable login protection for the Web UI.
      # When empty or unset, authentication is disabled (open access).
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      # ── Custom catapult server image testing ──
      # Forward the custom-image vars from .env into the container so the
      # backend registers the "custom" Catapult version (and the frontend Vite
      # dev server exposes the VITE_* ones to the dropdown). When unset they are
      # empty strings, which the backend treats as "disabled".
      - CUSTOM_SERVER_IMAGE=${CUSTOM_SERVER_IMAGE:-}
      - CUSTOM_NEEDS_OPENSSL_PATCH=${CUSTOM_NEEDS_OPENSSL_PATCH:-}
      - CUSTOM_CONFIG_PATCHES=${CUSTOM_CONFIG_PATCHES:-}
      - VITE_CUSTOM_SERVER_IMAGE=${VITE_CUSTOM_SERVER_IMAGE:-}
      - VITE_CUSTOM_REST_IMAGE=${VITE_CUSTOM_REST_IMAGE:-}
      - VITE_CUSTOM_TOOLS_IMAGE=${VITE_CUSTOM_TOOLS_IMAGE:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - manager-net

# Use a dedicated subnet for the manager so it does NOT overlap with
# symbol-bootstrap's internal docker_default network (172.20.0.0/24).
networks:
  manager-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
